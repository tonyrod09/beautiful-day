<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0D1B4B"/>
      <stop offset="28%"  stop-color="#1A3A7A"/>
      <stop offset="60%"  stop-color="#B84A25"/>
      <stop offset="82%"  stop-color="#E8832B"/>
      <stop offset="100%" stop-color="#FFB830"/>
    </linearGradient>
    <radialGradient id="g-sun-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE066" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#FF9500" stop-opacity="0.5"/>
      <stop offset="78%"  stop-color="#FF4400" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A3461"/>
      <stop offset="100%" stop-color="#0B1A33"/>
    </linearGradient>
    <linearGradient id="g-refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD93D" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF7700" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cl-sky">
      <rect x="0" y="0" width="600" height="222"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="600" height="300" fill="url(#g-sky)"/>

  <!-- Horizon atmospheric glow -->
  <ellipse cx="410" cy="222" rx="230" ry="72" fill="#FF7B1A" opacity="0.3"/>

  <!-- Sun halo -->
  <circle cx="410" cy="222" r="130" fill="url(#g-sun-halo)"/>

  <!-- Sun disk (above waterline only) -->
  <circle cx="410" cy="222" r="54" fill="#FFD93D" clip-path="url(#cl-sky)"/>
  <circle cx="410" cy="222" r="54" fill="#FFC000" opacity="0.18" clip-path="url(#cl-sky)"/>

  <!-- Water -->
  <rect x="0" y="222" width="600" height="78" fill="url(#g-water)"/>

  <!-- Sun path / golden reflection strip on water -->
  <path d="M375 222 Q410 225 445 222 Q438 238 426 248 Q410 256 394 248 Q382 238 375 222 Z"
        fill="url(#g-refl)" opacity="0.9"/>
  <path d="M386 248 Q410 255 434 248 Q428 263 410 269 Q392 263 386 248 Z"
        fill="#FF8C00" opacity="0.3"/>
  <path d="M394 269 Q410 275 426 269 Q423 282 410 287 Q397 282 394 269 Z"
        fill="#FF6600" opacity="0.17"/>

  <!-- Wave lines on water -->
  <g fill="none" stroke-linecap="round">
    <path d="M0 228 Q75 224 150 228 T300 228 T450 228 T600 228" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <path d="M0 239 Q75 235 150 239 T300 239 T450 239 T600 239" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <path d="M0 251 Q75 247 150 251 T300 251 T450 251 T600 251" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <path d="M0 264 Q75 260 150 264 T300 264 T450 264 T600 264" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>
    <path d="M0 279 Q75 275 150 279 T300 279 T450 279 T600 279" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  </g>

  <!-- CENTER CONSOLE BOAT — dark silhouette, bow up (planing), heading toward sunset -->
  <!-- Bow on left, stern on right. Rotation -5 lifts bow, drops stern -->
  <g transform="translate(55 174) rotate(-5 140 44)" fill="#0C1E38">
    <!-- T-top roof -->
    <rect x="90" y="0" width="92" height="6" rx="2.5"/>
    <!-- T-top support legs -->
    <rect x="93"  y="6" width="4" height="30"/>
    <rect x="176" y="6" width="4" height="30"/>
    <!-- Console + angled windshield -->
    <path d="M108,34 L108,52 L170,52 L170,43 L150,34 Z"/>
    <!-- Leaning post (aft of console) -->
    <rect x="172" y="36" width="6" height="16"/>
    <!-- Hull: pointed bow (left), flat transom (right) -->
    <path d="M0,50 Q4,44 18,44 L182,44 L228,52 L228,60 Q222,66 202,66 L18,66 Q2,66 0,60 Z"/>
    <!-- Bow rail — vertical post + horizontal bar -->
    <rect x="8"  y="40" width="3"  height="8"/>
    <rect x="8"  y="40" width="14" height="2"/>
    <!-- Outboard motors (2x — offshore ready) -->
    <rect x="228" y="48" width="5" height="18" rx="1"/>
    <rect x="235" y="48" width="5" height="18" rx="1"/>
    <rect x="226" y="65" width="16" height="5" rx="2"/>
    <!-- Tall fishing antenna / outrigger stubs -->
    <rect x="137" y="-54" width="3"   height="54"/>
    <rect x="158" y="-42" width="2.5" height="42" transform="rotate(4 159 0)"/>
  </g>

  <!-- Wake / rooster tail (trails to the right, behind the stern) -->
  <g fill="none" stroke-linecap="round">
    <path d="M296 238 Q342 230 390 234" stroke="rgba(255,255,255,0.60)" stroke-width="2.5"/>
    <path d="M289 249 Q337 240 396 244" stroke="rgba(255,255,255,0.44)" stroke-width="2"/>
    <path d="M282 261 Q332 252 402 256" stroke="rgba(255,255,255,0.30)" stroke-width="1.8"/>
    <path d="M274 273 Q326 264 408 269" stroke="rgba(255,255,255,0.19)" stroke-width="1.5"/>
    <path d="M266 286 Q320 277 414 282" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>
  </g>

  <!-- Bow spray (where hull planes on water) -->
  <path d="M110 228 Q120 220 133 224 Q125 232 110 228 Z" fill="rgba(255,255,255,0.62)"/>
  <path d="M102 233 Q114 224 127 228 Q119 237 102 233 Z" fill="rgba(255,255,255,0.40)"/>
  <path d="M95  238 Q108 229 120 233 Q112 242 95  238 Z" fill="rgba(255,255,255,0.22)"/>

  <!-- Seagulls in the sky -->
  <g fill="none" stroke-linecap="round">
    <path d="M76 62 Q81 57 86 62"   stroke="#263A6E" stroke-width="1.8"/>
    <path d="M98 47 Q104 41 110 47" stroke="#1F316A" stroke-width="1.8"/>
    <path d="M50 82 Q55 77 60 82"   stroke="#2A3F7A" stroke-width="1.8"/>
    <path d="M492 78 Q497 73 502 78" stroke="#2A3F7A" stroke-width="1.6"/>
    <path d="M517 62 Q523 56 529 62" stroke="#263A6E" stroke-width="1.6"/>
  </g>
</svg>
